services:
  db:
    image: postgres:15-alpine
    container_name: synclerabook-db
    restart: always
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: synclerabook
    ports:
      - "5433:5432"
    volumes:
      - synclerabook-data:/var/lib/postgresql/data

volumes:
  synclerabook-data: